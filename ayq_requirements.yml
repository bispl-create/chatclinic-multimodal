name: ayq
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip>=24
  - "setuptools<81"
  - wheel
  - pip:
      - "--extra-index-url=https://download.pytorch.org/whl/cu118"
      - "--find-links=https://download.openmmlab.com/mmcv/dist/cu118/torch2.1/index.html"
      - torch==2.1.2+cu118
      - torchvision==0.16.2+cu118
      - torchaudio==2.1.2+cu118
      - openmim
      - mmengine==0.10.7
      - mmcv==2.1.0
      - pycocotools
      - scipy
      - shapely
      - terminaltables
      - "numpy<2"
      - opencv-python==4.11.0.86
